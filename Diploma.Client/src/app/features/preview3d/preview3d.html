<!-- preview3d.html -->
<div
  class="fixed inset-0 z-[200] flex items-center justify-center bg-black/70 backdrop-blur-md p-4 animate-in fade-in duration-300"
  (click)="onClose()">

  <div
    class="relative w-full max-w-4xl bg-[#FFFDF9] rounded-[2.5rem] shadow-2xl overflow-hidden animate-in zoom-in-95 duration-300"
    style="height: 90vh; max-height: 700px;"
    (click)="$event.stopPropagation()">

    <!-- Header -->
    <div class="absolute top-0 left-0 right-0 z-10 flex items-center justify-between px-8 py-5 bg-gradient-to-b from-[#FFFDF9] to-transparent">
      <div>
        <h2 class="text-xl font-black italic uppercase tracking-tight text-gray-950">3D Preview</h2>
        <p class="text-[10px] font-bold text-gray-400 uppercase tracking-widest mt-0.5">
          Drag to rotate · Scroll to zoom
        </p>
      </div>
      <button
        (click)="onClose()"
        class="flex h-10 w-10 items-center justify-center rounded-full bg-white border border-gray-100 shadow-sm text-gray-500 hover:text-black hover:bg-gray-50 transition text-lg font-bold">
        ✕
      </button>
    </div>

    <!-- Loading State -->
    @if (isLoading()) {
      <div class="absolute inset-0 flex flex-col items-center justify-center gap-4 z-20 bg-[#FFFDF9]">
        <div class="relative w-16 h-16">
          <div class="absolute inset-0 rounded-full border-4 border-orange-100"></div>
          <div class="absolute inset-0 rounded-full border-4 border-t-[#E06A00] animate-spin"></div>
        </div>
        <div class="text-center space-y-1">
          <p class="text-sm font-black uppercase tracking-widest text-gray-900">Loading 3D Model</p>
          <p class="text-xs text-gray-400 font-medium">Applying your design as texture...</p>
        </div>
      </div>
    }

    <!-- Three.js Canvas -->
    <canvas
      #threeCanvas
      class="w-full h-full block"
      (mousedown)="stopAutoRotate()"
      (mouseup)="startAutoRotate()"
      (touchstart)="stopAutoRotate()"
      (touchend)="startAutoRotate()">
    </canvas>

    <!-- Bottom Controls -->
    <div class="absolute bottom-0 left-0 right-0 px-8 py-5 bg-gradient-to-t from-[#FFFDF9] to-transparent">
      <div class="flex items-center justify-between">

        <!-- Info -->
        <div class="flex items-center gap-2">
          <span class="inline-block w-2 h-2 rounded-full bg-[#E06A00] animate-pulse"></span>
          <span class="text-[10px] font-bold uppercase tracking-widest text-gray-400">
            3D Preview Mode · Read Only
          </span>
        </div>

        <!-- Close button -->
        <button
          (click)="onClose()"
          class="px-6 py-3 bg-black text-white text-[10px] font-black uppercase tracking-widest rounded-2xl hover:bg-gray-800 transition shadow-lg">
          Back to Editor
        </button>

      </div>
    </div>

  </div>
</div>
