<div class="min-h-screen flex items-center justify-center bg-gray-50 px-4 py-12">
  <div class="max-w-md w-full space-y-8 bg-white p-10 rounded-2xl shadow-xl border border-gray-100">
    
    <div class="text-center">
      <h2 class="text-3xl font-extrabold text-gray-900 tracking-tight">
        Створити аккаунт
      </h2>
      <p class="mt-2 text-sm text-gray-600">
        Приєднуйтесь до спільноти Panibratets Artwear
      </p>
    </div>

    <form class="mt-8 space-y-5" [formGroup]="registerForm" (ngSubmit)="onSubmit()">
      <div class="space-y-4">
        
        <div>
          <label class="block text-sm font-medium text-gray-700">Повне ім'я</label>
          <input type="text" formControlName="fullName"
            class="mt-1 block w-full px-4 py-3 bg-gray-50 border border-gray-300 rounded-lg focus:ring-2 focus:ring-black focus:border-black outline-none transition-all"
            placeholder="Олександра Панібратець">
        </div>

        <div>
          <label class="block text-sm font-medium text-gray-700">Email адреса</label>
          <input type="email" formControlName="email"
            class="mt-1 block w-full px-4 py-3 bg-gray-50 border border-gray-300 rounded-lg focus:ring-2 focus:ring-black focus:border-black outline-none transition-all"
            placeholder="name@example.com">
        </div>

        <div>
          <label class="block text-sm font-medium text-gray-700">Пароль</label>
          <input type="password" formControlName="password"
            class="mt-1 block w-full px-4 py-3 bg-gray-50 border border-gray-300 rounded-lg focus:ring-2 focus:ring-black focus:border-black outline-none transition-all"
            placeholder="••••••••">
          <p class="mt-1 text-xs text-gray-500 italic">Мінімум 8 символів, цифри та спецсимволи</p>
        </div>
      </div>

      <div *ngIf="errorMessage" class="p-3 bg-red-50 border border-red-200 rounded-lg">
        <p class="text-sm text-red-600 text-center">{{ errorMessage }}</p>
      </div>

      <div>
        <button type="submit" [disabled]="registerForm.invalid"
          class="w-full flex justify-center py-3 px-4 border border-transparent text-sm font-semibold rounded-lg text-white bg-black hover:bg-gray-800 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-black disabled:opacity-50 transition-all uppercase tracking-widest">
          Зареєструватися
        </button>
      </div>
    </form>

    <div class="text-center">
      <p class="text-xs text-gray-500">
        Вже маєте аккаунт? <a href="/login" class="font-medium text-black hover:underline">Увійти</a>
      </p>
    </div>
  </div>
</div>
