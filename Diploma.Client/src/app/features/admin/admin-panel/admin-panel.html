<div class="p-8 max-w-6xl mx-auto pt-24">
  <h1 class="text-3xl font-bold mb-8 italic">Панель керування Panibratets Artwear</h1>

  <div class="grid lg:grid-cols-3 gap-8">
    <div class="lg:col-span-1 bg-white p-6 rounded-2xl border border-gray-100 shadow-sm h-fit">
      <h2 class="text-xl font-semibold mb-4">Новий виріб</h2>
      <form [formGroup]="productForm" (ngSubmit)="onSave()" class="space-y-4">
        <input formControlName="name" placeholder="Назва виробу" class="w-full p-3 bg-gray-50 border rounded-xl outline-none focus:border-orange-500">
        <textarea formControlName="description" placeholder="Опис розпису" class="w-full p-3 bg-gray-50 border rounded-xl h-24"></textarea>
        <input type="number" formControlName="price" placeholder="Ціна" class="w-full p-3 bg-gray-50 border rounded-xl">
        
        <div class="flex flex-wrap gap-2">
          @for (size of sizes; track size) {
            <button type="button" (click)="toggleSize(size)" 
                    [class]="selectedSizes.includes(size) ? 'bg-orange-500 text-white' : 'bg-gray-100'"
                    class="px-3 py-1 rounded-lg text-xs font-bold transition">
              {{ size }}
            </button>
          }
        </div>

        <input formControlName="photoUrl" placeholder="URL зображення" class="w-full p-3 bg-gray-50 border rounded-xl">
        
        <button [disabled]="productForm.invalid" class="w-full py-3 bg-black text-white rounded-xl font-bold hover:bg-gray-800 disabled:opacity-30">
          Опублікувати
        </button>
      </form>
    </div>

 <div class="lg:col-span-2 space-y-4">
  @for (product of productService.products(); track product.id) {
    <div class="flex items-center gap-4 bg-white p-4 rounded-2xl border border-gray-100 shadow-sm hover:shadow-md transition">
      
      <img [src]="getMainPhotoUrl(product)" 
           class="w-20 h-20 rounded-xl object-cover" 
           [alt]="product.name">

      <div class="flex-grow">
        <h3 class="font-bold">{{ product.name }}</h3>
        <p class="text-sm text-gray-500">{{ product.price }} ₴ • {{ product.materials }}</p>
        
        <span class="text-[10px] text-gray-400 italic">
          Усього фото: {{ product.photos?.length || 0 }}
        </span>
      </div>

      <button (click)="productService.deleteProduct(product.id)" class="p-2 text-red-500 hover:bg-red-50 rounded-lg transition">
        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"/>
        </svg>
      </button>
    </div>
  }
</div>
