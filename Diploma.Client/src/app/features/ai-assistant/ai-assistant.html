<div class="w-full max-w-3xl mx-auto space-y-6">
  <textarea
    [ngModel]="userVision()"
    (ngModelChange)="userVision.set($event)"
    placeholder="E.g., 'A white oversized T-shirt with a hand-painted flower in the center...'"
    class="w-full min-h-[140px] rounded-3xl border border-gray-200 bg-white p-5 text-sm text-gray-800 placeholder:text-gray-400 outline-none transition focus:border-orange-400 focus:ring-2 focus:ring-orange-200 resize-none">
  </textarea>

  <button
    type="button"
    (click)="generate()"
    [disabled]="isLoading()"
    class="w-full rounded-2xl bg-black px-6 py-4 text-white font-black uppercase tracking-[0.2em] text-[10px] transition hover:scale-[1.01] disabled:opacity-50 disabled:cursor-not-allowed">
    @if (isLoading()) {
      <span class="animate-pulse">Generating Image...</span>
    } @else {
      <span>✨ AI Generated Design</span>
    }
  </button>

  <div class="flex flex-wrap gap-2">
    @for (example of examples; track example) {
      <button
        type="button"
        (click)="useExample(example)"
        class="rounded-full border border-orange-200 bg-orange-50 px-4 py-2 text-xs font-semibold text-orange-700 transition hover:bg-orange-100">
        {{ example }}
      </button>
    }
  </div>

  @if (errorMessage()) {
    <div class="rounded-2xl border border-red-200 bg-red-50 px-4 py-3 text-sm text-red-600">
      {{ errorMessage() }}
    </div>
  }

  <div class="result-container">
    @if (isLoading()) {
      <div class="flex flex-col items-center py-12">
        <div class="h-12 w-12 animate-spin rounded-full border-4 border-orange-500 border-t-transparent"></div>
        <p class="mt-4 text-[10px] font-black uppercase italic tracking-widest text-orange-500">
          Creating Magic...
        </p>
      </div>
    } @else if (generatedImage()) {
      <div class="rounded-[2rem] bg-white p-4 sm:p-6 shadow-xl border border-gray-100">
        <div class="overflow-hidden rounded-[2rem] border-4 border-white bg-gray-100 shadow-2xl">
          <img
            [src]="generatedImage()!"
            alt="AI Generated Design"
            class="w-full h-auto object-cover" />
        </div>
      </div>
    } @else {
      <div class="py-12 text-center opacity-30">
        <span class="text-6xl">✨</span>
        <p class="mt-4 italic">Your AI-generated image will appear here</p>
      </div>
    }
  </div>
</div>
