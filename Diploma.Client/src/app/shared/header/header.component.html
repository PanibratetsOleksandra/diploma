<div class=" flex flex-col bg-white font-sans text-gray-900">
  
  <nav class="fixed top-0 w-full z-50 bg-white/80 backdrop-blur-md border-b border-gray-100">
    <div class="max-w-7xl mx-auto px-6 h-20 flex items-center justify-between">
      
      <div class="flex items-center gap-2 cursor-pointer" routerLink="/">
        <div class="w-10 h-10 bg-orange-500 rounded-full flex items-center justify-center">
          <span class="text-white font-bold text-xl">P</span>
        </div>
        <span class="text-xl font-bold tracking-tight">Panibratets Artwear</span>
      </div>

      <div class="hidden md:flex items-center gap-8">
        <a routerLink="/" class="text-sm font-medium hover:text-orange-500 transition">Home</a>
        <a routerLink="/shop" class="text-sm font-medium hover:text-orange-500 transition">Shop</a>
        <a routerLink="/ai-artist" class="text-sm font-medium hover:text-orange-500 transition">AI Artist</a>
        <a routerLink="/designer" class="text-sm font-medium hover:text-orange-500 transition">Designer</a>
        <a routerLink="/blog" class="text-sm font-medium hover:text-orange-500 transition">Blog</a>
      </div>

   <div class="flex items-center gap-3 border-r border-gray-200 pr-4 mr-1">
  
  <div class="flex items-center gap-3 border-r border-gray-200 pr-4 mr-1">

  @if (!authService.isAuthenticated) {
    <a routerLink="/login" class="text-sm font-semibold hover:text-orange-500 transition">
      Увійти
    </a>
    <a routerLink="/register" class="bg-black text-white px-4 py-2 rounded-full text-xs font-bold hover:bg-gray-800 transition shadow-sm uppercase tracking-wider">
      Реєстрація
    </a>
  } 
  @else {
    <div class="flex items-center gap-3">
      <a routerLink="/profile" 
         class="flex items-center gap-2 px-4 py-2 bg-gray-50 hover:bg-black hover:text-white rounded-full transition-all duration-300 group">
        <svg class="w-4 h-4 text-gray-400 group-hover:text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        <span class="text-xs font-bold uppercase tracking-widest">My Account</span>
      </a>

      <button (click)="logout()" class="text-sm font-semibold text-red-500 hover:text-red-700 transition">
        Вийти
      </button>
    </div>
  }

  <button class="relative hover:text-orange-500 transition p-1">
    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
      <path d="M16 11V7a4 4 0 00-8 0v4M5 9h14l1 12H4L5 9z" stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"/>
    </svg>
    <span class="absolute -top-1 -right-1 bg-orange-500 text-white text-[10px] w-4 h-4 rounded-full flex items-center justify-center font-bold">0</span>
  </button>

</div>
